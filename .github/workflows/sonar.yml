name: SonarQube

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Skip when SONAR_TOKEN is not configured
        if: env.SONAR_TOKEN == ''
        run: |
          echo "SONAR_TOKEN is not configured; skipping SonarQube scan."

      - name: Run SonarQube scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
